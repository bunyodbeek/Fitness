{% comment %}
Shared "big" program-card styles.
Used by BOTH the programs list (grid / "plitka" view) and the plans
(edition_list) page so that program cards and plan cards stay visually
identical from one source. Include ONCE inside the page's extra_css block.
{% endcomment %}
<style>
    /* ===== PROGRAM CARD (shared) ===== */
    .program-card {
        position: relative;
        display: block;
        height: 180px;
        overflow: hidden;
        border-radius: 16px;
        background: #101010;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease;
        animation: slideInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0;
        animation-fill-mode: forwards;
    }

    .program-card:active {
        transform: scale(0.98);
    }

    /* Non-clickable variant (e.g. the program header card on the plans page). */
    .program-card--static {
        cursor: default;
    }
    .program-card--static:active {
        transform: none;
    }

    @media (hover: hover) {
        .program-card:hover {
            border-color: rgba(255, 215, 0, 0.35);
        }

        .program-card:hover .program-image {
            transform: scale(1.06);
        }

        .program-card--static:hover {
            border-color: rgba(255, 255, 255, 0.08);
        }
        .program-card--static:hover .program-image {
            transform: none;
        }
    }

    @keyframes slideInUp {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .program-card:nth-child(1) { animation-delay: 0.05s; }
    .program-card:nth-child(2) { animation-delay: 0.10s; }
    .program-card:nth-child(3) { animation-delay: 0.15s; }
    .program-card:nth-child(4) { animation-delay: 0.20s; }
    .program-card:nth-child(5) { animation-delay: 0.25s; }
    .program-card:nth-child(6) { animation-delay: 0.30s; }

    .program-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.82) contrast(1.05);
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .program-image-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        font-weight: 900;
        color: rgba(255, 215, 0, 0.45);
        background: rgba(255, 215, 0, 0.06);
    }

    .program-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg,
            rgba(0, 0, 0, 0.02) 0%,
            rgba(0, 0, 0, 0.08) 35%,
            rgba(0, 0, 0, 0.90) 100%);
        z-index: 1;
    }

    .program-title-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 0 18px 64px;
        z-index: 3;
    }

    .program-title-overlay h2 {
        font-size: 28px;
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: -1px;
        color: white;
        margin-bottom: 5px;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }

    .program-description {
        font-size: 13px;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.72);
        max-width: 240px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .program-info {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 48px;
        z-index: 4;
        -webkit-backdrop-filter: blur(2px);
        backdrop-filter: blur(2px);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .program-meta {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .program-meta .meta-item {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        color: white;
        font-size: 13px;
        font-weight: 500;
        min-width: 0;
        white-space: nowrap;
    }

    .program-meta .meta-item:not(:last-child) {
        border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .program-meta .meta-item svg {
        flex-shrink: 0;
        color: #ffd700;
        stroke: #ffd700;
    }

    /* ===== Badges on big cards ===== */
    .card-lock-badge,
    .card-foryou-badge,
    .card-popular-badge {
        position: absolute;
        top: 12px;
        z-index: 6;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 11px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }
    .card-lock-badge svg,
    .card-foryou-badge svg,
    .card-popular-badge svg { flex-shrink: 0; }

    .card-lock-badge {
        right: 12px;
        background: rgba(0, 0, 0, 0.65);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 215, 0, 0.55);
        color: #ffd700;
    }

    .card-foryou-badge {
        left: 12px;
        background: rgba(0, 0, 0, 0.65);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 215, 0, 0.55);
        color: #ffd700;
    }

    .card-popular-badge {
        right: 12px;
        background: #ff9f0a;
        color: #1a1300;
        box-shadow: 0 4px 14px rgba(255, 159, 10, 0.35);
        text-transform: uppercase;
    }
</style>
