{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Workout - {{ workout.title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Eski stillar ham saqlanadi (override qilinadi lekin xavfsiz) -->
    
    <!-- Home Mode Styles Override -->
    <style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --gold: #ffd700;
    --gold2: #ffb300;
    --red: #ff4757;
    --green: #2ed573;
    --bg: #0d0f18;
    --bg2: #111629;
    --bg3: #1a2038;
    --border: rgba(255,215,0,0.12);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.45);
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,215,0,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 90%, rgba(255,71,87,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
}

/* HEADER */
.session-header {
    position: sticky;
    top: 0;
    z-index: 200;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    gap: 8px;
    background: rgba(13,15,24,0.98);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    gap: 8px;
}

.exit-btn {
    background: rgba(255,71,87,0.1);
    border: 1.5px solid rgba(255,71,87,0.35);
    color: var(--red);
    padding: 7px 14px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
}

.progress-counter {
    flex: 1;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--gold);
}

.floating-timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
    flex-shrink: 0;
    transition: opacity 0.3s ease;
}

.floating-timer.hidden { opacity: 0; pointer-events: none; }

.menu-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--gold);
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
}

/* MAIN */
.exercise-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 110px;
    gap: 14px;
    max-width: 500px;
    margin: 0 auto;
}

/* MEDIA */
.exercise-media-container {
    width: 100%;
    aspect-ratio: 16/10;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    border: 1.5px solid rgba(255,215,0,0.15);
    background: rgba(255,215,0,0.04);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.exercise-image {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
}

.exercise-video {
    width: 100%; height: 100%;
    object-fit: cover; display: none;
}

.exercise-video.active { display: block; }

.play-video-hint {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(13,15,24,0.8);
    border: 1px solid rgba(255,215,0,0.2);
    color: var(--gold);
    font-size: 10px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    z-index: 3;
}

.exercise-description-overlay {
    position: absolute;
    inset: auto 0 0 0;
    padding: 40px 14px 12px;
    background: linear-gradient(180deg, transparent 0%, rgba(13,15,24,0.96) 50%);
    cursor: pointer;
    z-index: 2;
}

.exercise-description-overlay.expanded {
    max-height: 80%;
    overflow-y: auto;
    padding-top: 16px;
    background: rgba(13,15,24,0.97);
}

.exercise-description-text {
    font-size: 12px;
    line-height: 1.5;
    color: rgba(255,255,255,0.7);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.exercise-description-overlay.expanded .exercise-description-text {
    display: block;
    -webkit-line-clamp: unset;
}

.exercise-description-hint {
    margin-top: 5px;
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
}

/* EXERCISE NAME */
.exercise-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(26px, 8vw, 34px);
    letter-spacing: 2px;
    text-align: center;
    color: var(--gold);
    line-height: 1.1;
    width: 100%;
    text-shadow: 0 0 30px rgba(255,215,0,0.25);
}

/* CHIPS */
#strengthDetails {
    display: none;
    width: 100%;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
}

.strength-chip {
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
}

.strength-chip span { color: var(--gold); font-weight: 800; }

.strength-chip input[type="number"] {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,215,0,0.5);
    color: var(--gold);
    width: 38px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    text-align: center;
    outline: none;
}

.strength-chip input[type="number"]::-webkit-inner-spin-button,
.strength-chip input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

/* UP NEXT */
.up-next-section {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.up-next-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
}

.up-next-content {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
}

.up-next-image {
    width: 44px; height: 44px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid var(--border);
    flex-shrink: 0;
}

.up-next-name {
    font-size: 13px;
    font-weight: 700;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.up-next-details {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
}

/* BOTTOM BAR */
.action-buttons {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 88px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px 16px;
    background: rgba(13,15,24,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    z-index: 150;
}

.pause-btn {
    width: 54px; height: 54px;
    flex-shrink: 0;
    background: rgba(255,215,0,0.08);
    border: 1.5px solid rgba(255,215,0,0.2);
    color: var(--gold);
    border-radius: 14px;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.did-it-btn {
    flex: 1;
    height: 54px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0a0d1a;
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(255,215,0,0.3);
}

.did-it-btn.completed {
    background: rgba(255,215,0,0.1);
    color: var(--gold);
    border: 1.5px solid rgba(255,215,0,0.2);
    box-shadow: none;
}

.did-it-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* REST OVERLAY */
.rest-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,7,18,0.75);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
}

.rest-overlay.active { opacity: 1; pointer-events: all; }

.rest-overlay-panel {
    width: 100%;
    max-width: 500px;
    background: linear-gradient(180deg, #0d1025 0%, #0d0f18 100%);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 28px 28px 0 0;
    padding: 32px 24px 40px;
    text-align: center;
    box-shadow: 0 -24px 60px rgba(0,0,0,0.6);
    transform: translateY(40px);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}

.rest-overlay.active .rest-overlay-panel { transform: translateY(0); }

.rest-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(255,215,0,0.4);
}

.set-complete-badge {
    display: inline-block;
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    color: var(--gold);
    padding: 7px 18px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 24px;
}

.rest-timer-circle {
    width: 170px; height: 170px;
    border-radius: 50%;
    border: 3px solid rgba(255,215,0,0.35);
    background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 0 50px rgba(255,215,0,0.12), inset 0 0 30px rgba(255,215,0,0.04);
    cursor: pointer;
}

.rest-timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
}

.rest-skip-text {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,215,0,0.45);
    margin-top: 6px;
}

.rest-skip-btn {
    background: transparent;
    border: 1.5px solid rgba(255,215,0,0.2);
    color: var(--gold);
    padding: 10px 28px;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 20px;
}

.rest-up-next-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
}

.rest-up-next-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: white;
}

/* EXIT MODAL */
.exit-modal {
    position: fixed;
    inset: 0;
    background: rgba(5,7,18,0.88);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    padding: 20px;
}

.exit-modal.active { opacity: 1; pointer-events: all; }

.exit-modal-content {
    width: 100%;
    max-width: 360px;
    background: #0d1025;
    border: 1px solid rgba(255,215,0,0.18);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    transform: scale(0.95);
    transition: transform 0.25s ease;
}

.exit-modal.active .exit-modal-content { transform: scale(1); }

.exit-modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 8px;
}

.exit-modal p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
}

.exit-modal-buttons { display: flex; flex-direction: column; gap: 10px; }

.exit-modal button {
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-save-exit {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0a0d1a;
    border: none;
    box-shadow: 0 4px 16px rgba(255,215,0,0.3);
}

.btn-save-exit:disabled {
    background: rgba(255,215,0,0.15);
    color: rgba(255,215,0,0.35);
    cursor: not-allowed;
    box-shadow: none;
}

.exit-modal button:not(.btn-save-exit) {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
}

.exit-modal button:not(.btn-save-exit):hover {
    background: rgba(255,255,255,0.05);
    color: white;
}
</style>
</head>

<body>
    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

    <!-- ============================================================
     HEADER
     ============================================================ -->
    <div class="session-header">
        <button class="exit-btn" onclick="showExitModal()">EXIT</button>

        <div class="progress-counter">
            <span id="current">1</span>&nbsp;/&nbsp;<span id="total">{{ total_exercises }}</span>
        </div>

        <!-- Timer header ichida, menu-btn dan chap tomonda -->
        <div class="floating-timer" id="floatingTimer">00:00</div>

        <button class="menu-btn">
            <i class="fas fa-ellipsis-v"></i>
        </button>
    </div>

    <!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
    <div class="exercise-content">

        <!-- Media card -->
        <div class="exercise-media-container" onclick="toggleExerciseMedia()">
            <video class="exercise-video" id="exerciseVideo" playsinline controls></video>
            <img src="{% static 'images/default_exercise.svg' %}" alt="Exercise" class="exercise-image"
                id="exerciseImage">
            <div class="play-video-hint" id="playVideoHint" style="display:none;">
                Tap image to play video
            </div>
            <div class="exercise-description-overlay" id="exerciseDescriptionCard"
                onclick="toggleExerciseDescription(event)" style="display:none;">
                <div class="exercise-description-text" id="exerciseDescription"></div>
                <div class="exercise-description-hint" id="exerciseDescriptionHint">Tap to expand</div>
            </div>
        </div>

        <!-- Exercise name -->
        <h2 class="exercise-name" id="exerciseName"></h2>

        <!-- Set / Reps chips -->
        <div id="strengthDetails">
            <div class="strength-chip">
                Set <span id="currentSet">1</span> / <span id="totalSets"></span>
            </div>
            <div class="strength-chip">
                <span id="repsCount"></span> Reps
            </div>
            <div class="strength-chip" style="display:flex; align-items:center; gap:5px;">
                <input type="number" id="weightInput" value="" step="0.5" min="0" placeholder="0"> kg
            </div>
        </div>

        <!-- Up next -->
        <div class="up-next-section" id="upNext" style="display:none;">
            <div class="up-next-label">UP NEXT</div>
            <div class="up-next-content">
                <img src="{% static 'images/default_exercise.svg' %}" alt="Next" class="up-next-image" id="upNextImage">
                <div class="up-next-info">
                    <div class="up-next-name" id="upNextName"></div>
                    <div class="up-next-details" id="upNextDetails"></div>
                </div>
            </div>
        </div>

    </div><!-- /exercise-content -->

    <!-- ============================================================
     BOTTOM ACTION BAR
     ============================================================ -->
    <div class="action-buttons">
        <button class="pause-btn" id="pauseBtn" onclick="togglePause()">
            <span id="pauseIcon"><i class="fas fa-pause"></i></span>
        </button>
        <button class="did-it-btn" id="didItBtn" onclick="completeExercise()">
            Set Done
        </button>
    </div>

    <!-- ============================================================
     REST OVERLAY
     ============================================================ -->
    <div class="rest-overlay" id="restOverlay">
        <div class="rest-overlay-panel">
            <div class="rest-title">Rest</div>
            <div class="set-complete-badge" id="setCompleteBadge">Set 1 Complete ✅</div>

            <div class="rest-timer-circle">
                <div class="rest-timer" id="restTimer">00:00</div>
                <div class="rest-skip-text">Recover &amp; breathe</div>
            </div>

            <button class="rest-skip-btn" onclick="skipRest()">Skip Rest</button>

            <div class="rest-up-next">
                <div class="rest-up-next-label">Next Up</div>
                <div class="rest-up-next-name" id="restUpNextName">Set 2</div>
            </div>
        </div>
    </div>

    <!-- ============================================================
     EXIT MODAL
     ============================================================ -->
    <div class="exit-modal" id="exitModal">
        <div class="exit-modal-content">
            <h3>Finish Workout?</h3>
            <p>You have not completed all exercises.</p>
            <div class="exit-modal-buttons">
                <button id="saveExitBtn" class="btn-save-exit" onclick="saveAndExit()">
                    Save &amp; Exit
                </button>
                <button onclick="exitWithoutSaving()">Exit without Saving</button>
                <button onclick="returnToWorkout()">Return to Workout</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
     CONFIG & SCRIPTS
     ============================================================ -->
    <script>
        window.ACTIVE_WORKOUT_CONFIG = {
            workoutPk: "{{ workout.pk }}",
            totalExercises: {{ total_exercises|default:0 }},
            csrfToken: "{{ csrf_token }}",
            exercises: {{ exercises_json|safe }},
            initialExerciseIndex: {{ initial_exercise_index|default:0 }},
            initialSet: {{ initial_set|default:1 }},
            initialCompleted: {{ initial_completed|default:0 }},
        defaultExerciseImage: "{% static 'images/default_exercise.svg' %}",
            completeUrl: "{{ workout_complete_url|default:'' }}",
                restartUrl: "{{ workout_start_url|default:'' }}",
    };
        const WORKOUT_URLS = {
            complete: "{{ workout_complete_url|default:'' }}",
            start: "{{ workout_start_url|default:'' }}"
        };
    </script>
    <script src="{% static 'js/active_workout.js' %}"></script>
</body>

</html>
