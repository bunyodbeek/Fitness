{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Active Workout - {{ workout.title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
    --gold: #ffd700;
    --gold2: #ffb300;
    --red: #ff4757;
    --bg: #0d0f18;
    --border: rgba(255,215,0,0.12);
    --muted: rgba(255,255,255,0.45);
    --card-bg: rgba(255,255,255,0.04);
}

body {
    background: var(--bg);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* ── HEADER ── */
.session-header {
    position: sticky; top: 0; z-index: 200;
    height: 52px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 14px; gap: 8px;
    background: rgba(13,15,24,0.98); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
}
.exit-btn {
    background: rgba(255,71,87,0.1); border: 1.5px solid rgba(255,71,87,0.35);
    color: var(--red); padding: 6px 14px; border-radius: 10px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; cursor: pointer; flex-shrink: 0;
}
.progress-counter {
    flex: 1; text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px; color: var(--gold);
}
.floating-timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 2px; color: var(--gold);
    line-height: 1; flex-shrink: 0; transition: opacity 0.3s;
}
.floating-timer.hidden { opacity: 0; pointer-events: none; }

/* ── MAIN ── */
.exercise-content {
    display: flex; flex-direction: column; align-items: center;
    /* 80px bar + 26px buffer */
    padding: 12px 14px 106px;
    gap: 10px; max-width: 500px; margin: 0 auto;
}

.exercise-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 6vw, 28px); letter-spacing: 2px;
    text-align: center; color: var(--gold); line-height: 1.1; width: 100%;
}

/* ── MEDIA ── */
.exercise-media-container {
    width: 100%; aspect-ratio: 16/10; border-radius: 16px; overflow: hidden;
    border: 1.5px solid rgba(255,215,0,0.15); background: rgba(0,0,0,0.4);
    box-shadow: 0 12px 36px rgba(0,0,0,0.5); cursor: pointer; flex-shrink: 0;
}
.exercise-image { width:100%; height:100%; object-fit:cover; display:block; }
.exercise-video { width:100%; height:100%; object-fit:cover; display:none; pointer-events:none; }
.exercise-video.active { display:block; }

/* ── DESC TRIGGER ── */
.desc-trigger {
    width: 100%; background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 9px 14px; display: none;
    align-items: center; justify-content: space-between; cursor: pointer; gap: 10px;
}
.desc-trigger-text { font-size:12px; color:rgba(255,255,255,0.6); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.desc-trigger-btn { font-size:10px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:1px; flex-shrink:0; }

/* ── SETS ── */
.sets-wrapper { width:100%; display:flex; flex-direction:column; gap:6px; }

.set-label-row {
    display:flex; align-items:center; justify-content:space-between; padding:0 2px;
}
.set-label-text { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.set-label-done { font-size:10px; font-weight:700; color:var(--gold); opacity:0; transition:opacity 0.3s; }
.set-label-done.show { opacity:1; }

/* ──────────────────────────────────────────────────────
   SET CARD  layout:
   ┌─────────────────────┬────────────┬──────────┐
   │  [input kg]  kg     │  reps lbl  │  Did It  │
   └─────────────────────┴────────────┴──────────┘
   Input IS the weight display — no invisible overlay.
────────────────────────────────────────────────── */
.set-card {
    width: 100%; border-radius: 14px; overflow: hidden;
    display: flex; flex-direction: row; align-items: stretch;
    min-height: 64px;
    background: var(--gold);
    box-shadow: 0 4px 18px rgba(255,215,0,0.15);
    transition: background 0.4s, box-shadow 0.4s;
}
.set-card.done {
    background: rgba(255,215,0,0.09);
    border: 1.5px solid rgba(255,215,0,0.2);
    box-shadow: none;
}

/* Weight zone — input styled like display text */
.set-weight-zone {
    flex: 0 0 42%;
    display: flex; align-items: center;
    padding: 0 6px 0 14px; gap: 3px;
    position: relative;
}

/*
  KEY FIX: input is visible and styled as display text.
  No opacity:0 tricks. The input IS what user sees & taps.
*/
.w-inp {
    /* look like big bold number */
    width: 0; flex: 1;
    min-width: 0;
    font-size: 30px;
    font-weight: 900;
    color: #0a0d1a;
    line-height: 1;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: -1px;
    /* remove all default input styling */
    background: transparent;
    border: none;
    outline: none;
    -webkit-appearance: none;
    -moz-appearance: textfield;
    /* allow tap on mobile */
    -webkit-user-select: text;
    user-select: text;
    cursor: text;
    padding: 0;
    text-align: left;
    transition: color 0.4s;
}
.w-inp::-webkit-outer-spin-button,
.w-inp::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.set-card.done .w-inp { color: var(--gold); pointer-events: none; }

/* Subtle underline only when focused */
.w-inp:focus { border-bottom: 2px solid rgba(0,0,0,0.25); }
.set-card.done .w-inp:focus { border-bottom: none; }

.w-unit {
    font-size: 13px; font-weight: 700;
    color: rgba(10,13,26,0.5); align-self: flex-end;
    margin-bottom: 6px; flex-shrink: 0; pointer-events: none;
    transition: color 0.4s;
}
.set-card.done .w-unit { color: rgba(255,215,0,0.4); }

/* Divider */
.set-divider {
    width: 1.5px; background: rgba(0,0,0,0.1);
    align-self: stretch; margin: 10px 0; flex-shrink: 0;
    transition: background 0.4s;
}
.set-card.done .set-divider { background: rgba(255,215,0,0.12); }

/* Reps zone */
.set-reps-zone {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px; gap: 1px; min-width: 0;
}
.r-num {
    font-size: 20px; font-weight: 900;
    color: rgba(10,13,26,0.82); line-height: 1;
    font-family: 'DM Sans', sans-serif; transition: color 0.4s; white-space: nowrap;
}
.set-card.done .r-num { color: rgba(255,215,0,0.6); }
.r-lbl {
    font-size: 9px; font-weight: 700;
    color: rgba(10,13,26,0.4); text-transform: uppercase; letter-spacing: 1px;
    transition: color 0.4s;
}
.set-card.done .r-lbl { color: rgba(255,215,0,0.28); }

/* Did It — right edge, full height */
.did-it-cell {
    flex: 0 0 66px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.13);
    border-left: 1.5px solid rgba(0,0,0,0.08);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 800; color: #0a0d1a;
    letter-spacing: 0.3px; text-align: center;
    line-height: 1.3; padding: 4px 6px;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    position: relative; overflow: hidden;
    transition: background 0.15s, color 0.4s, border-color 0.4s;
    /* must be above siblings so tap lands here */
    z-index: 1;
}
.did-it-cell:active { background: rgba(0,0,0,0.22); }
.set-card.done .did-it-cell {
    background: transparent; border-left-color: rgba(255,215,0,0.1);
    color: rgba(255,215,0,0.5); font-size: 18px; pointer-events: none;
}

/* Ripple */
.ripple-c {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.4); transform: scale(0);
    animation: ripAnim 0.55s linear forwards; pointer-events: none;
}
@keyframes ripAnim { to { transform:scale(4); opacity:0; } }

/* Pulse ring */
@keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(255,215,0,0.5); }
    60%  { box-shadow: 0 0 0 14px rgba(255,215,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); }
}
.set-card.pulse { animation: pulseRing 0.6s ease-out; }

/* ── BOTTOM BAR ── */
.action-buttons {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 80px; display: flex; align-items: center;
    padding: 0 14px 14px;
    background: rgba(13,15,24,0.98); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border); z-index: 300;
}
.pause-btn {
    width: 52px; height: 52px;
    background: rgba(255,215,0,0.07); border: 1.5px solid rgba(255,215,0,0.2);
    color: var(--gold); border-radius: 14px; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}

/* ── REST OVERLAY ── */
.rest-overlay {
    position: fixed; inset: 0; background: rgba(5,7,18,0.78);
    backdrop-filter: blur(12px); display: flex; align-items: flex-end;
    justify-content: center; z-index: 500; opacity: 0; pointer-events: none;
    transition: opacity 0.35s;
}
.rest-overlay.active { opacity:1; pointer-events:all; }
.rest-panel {
    width:100%; max-width:500px;
    background:linear-gradient(180deg,#0d1025,#0d0f18);
    border:1px solid var(--border); border-bottom:none;
    border-radius:28px 28px 0 0; padding:28px 24px 40px;
    text-align:center; transform:translateY(40px);
    transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.rest-overlay.active .rest-panel { transform:translateY(0); }
.rest-title { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:4px; color:var(--gold); margin-bottom:8px; }
.rest-badge { display:inline-block; background:rgba(255,215,0,0.08); border:1px solid rgba(255,215,0,0.2); color:var(--gold); padding:6px 16px; border-radius:999px; font-size:12px; font-weight:700; margin-bottom:22px; }
.rest-circle { width:164px; height:164px; border-radius:50%; border:3px solid rgba(255,215,0,0.3); background:radial-gradient(circle,rgba(255,215,0,0.05) 0%,transparent 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 18px; cursor:pointer; }
.rest-time { font-family:'Bebas Neue',sans-serif; font-size:50px; letter-spacing:3px; color:var(--gold); line-height:1; text-shadow:0 0 30px rgba(255,215,0,0.5); }
.rest-skip-hint { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,215,0,0.4); margin-top:5px; }
.rest-skip-btn { background:transparent; border:1.5px solid rgba(255,215,0,0.2); color:var(--gold); padding:9px 26px; border-radius:14px; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; margin-bottom:18px; }
.rest-next-lbl { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.rest-next-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:#fff; }

/* ── DESC MODAL ── */
.desc-overlay { position:fixed; inset:0; background:rgba(5,7,18,0.8); backdrop-filter:blur(12px); z-index:700; display:flex; align-items:flex-start; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s; padding-top:52px; }
.desc-overlay.active { opacity:1; pointer-events:all; }
.desc-panel { width:100%; max-width:500px; background:#0d1025; border:1px solid var(--border); border-top:none; border-radius:0 0 24px 24px; overflow:hidden; transform:translateY(-20px); transition:transform 0.3s cubic-bezier(0.34,1.4,0.64,1); max-height:calc(100vh - 52px); display:flex; flex-direction:column; }
.desc-overlay.active .desc-panel { transform:translateY(0); }
.desc-video { width:100%; aspect-ratio:16/10; object-fit:cover; display:none; background:#000; pointer-events:none; }
.desc-video.has-v { display:block; }
.desc-img { width:100%; aspect-ratio:16/10; object-fit:cover; display:block; }
.desc-img.hidden { display:none; }
.desc-body { padding:20px; overflow-y:auto; flex:1; }
.desc-name { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; color:var(--gold); margin-bottom:12px; }
.desc-text { font-size:13px; line-height:1.7; color:rgba(255,255,255,0.75); }
.desc-close { position:absolute; top:60px; right:14px; width:34px; height:34px; border-radius:50%; background:rgba(13,15,24,0.9); border:1px solid var(--border); color:var(--gold); font-size:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:701; }

/* ── EXIT MODAL ── */
.exit-modal { position:fixed; inset:0; background:rgba(5,7,18,0.88); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center; z-index:1000; opacity:0; pointer-events:none; transition:opacity 0.25s; padding:20px; }
.exit-modal.active { opacity:1; pointer-events:all; }
.exit-content { width:100%; max-width:360px; background:#0d1025; border:1px solid rgba(255,215,0,0.18); border-radius:24px; padding:30px 22px; text-align:center; transform:scale(0.95); transition:transform 0.25s; }
.exit-modal.active .exit-content { transform:scale(1); }
.exit-content h3 { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--gold); margin-bottom:7px; }
.exit-content p { font-size:13px; color:var(--muted); margin-bottom:22px; line-height:1.5; }
.exit-btns { display:flex; flex-direction:column; gap:10px; }
.exit-btns button { width:100%; padding:12px; border-radius:13px; font-size:13px; font-weight:700; cursor:pointer; }
.btn-save { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0a0d1a; border:none; }
.btn-save:disabled { background:rgba(255,215,0,0.15); color:rgba(255,215,0,0.35); cursor:not-allowed; }
.exit-btns button:not(.btn-save) { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--muted); }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="session-header">
    <button class="exit-btn" onclick="showExitModal()">EXIT</button>
    <div class="progress-counter">
        <span id="current">1</span>&nbsp;/&nbsp;<span id="total">{{ total_exercises }}</span>
    </div>
    <div class="floating-timer" id="floatingTimer">00:00</div>
</div>

<!-- MAIN -->
<div class="exercise-content">
    <h2 class="exercise-name" id="exerciseName"></h2>

    <div class="exercise-media-container" onclick="toggleExerciseMedia()">
        <video class="exercise-video" id="exerciseVideo" muted autoplay loop playsinline preload="auto"></video>
        <img src="{% static 'images/default_exercise.svg' %}" alt="" class="exercise-image" id="exerciseImage">
    </div>

    <div class="desc-trigger" id="descTrigger" onclick="openDescModal()">
        <div class="desc-trigger-text" id="descTriggerText"></div>
        <div class="desc-trigger-btn">TAP TO EXPAND</div>
    </div>

    <div class="sets-wrapper" id="setsWrapper"></div>
</div>

<!-- BOTTOM BAR -->
<div class="action-buttons">
    <button class="pause-btn" id="pauseBtn" onclick="togglePause()">
        <span id="pauseIcon"><i class="fas fa-pause"></i></span>
    </button>
</div>

<!-- DESC MODAL -->
<div class="desc-overlay" id="descModal" onclick="closeDescModalOnBg(event)">
    <button class="desc-close" onclick="closeDescModal()"><i class="fas fa-times"></i></button>
    <div class="desc-panel">
        <video class="desc-video" id="descModalVideo" muted autoplay loop playsinline></video>
        <img src="" alt="" class="desc-img" id="descModalImg">
        <div class="desc-body">
            <div class="desc-name" id="descModalName"></div>
            <div class="desc-text" id="descModalText"></div>
        </div>
    </div>
</div>

<!-- REST OVERLAY -->
<div class="rest-overlay" id="restOverlay">
    <div class="rest-panel">
        <div class="rest-title">Rest</div>
        <div class="rest-badge" id="restBadge">Set 1 Complete ✓</div>
        <div class="rest-circle" onclick="skipRest()">
            <div class="rest-time" id="restTimer">01:00</div>
            <div class="rest-skip-hint">Tap to skip</div>
        </div>
        <button class="rest-skip-btn" onclick="skipRest()">Skip Rest</button>
        <div class="rest-next-lbl">Next Up</div>
        <div class="rest-next-name" id="restNextName">Set 2</div>
    </div>
</div>

<!-- EXIT MODAL -->
<div class="exit-modal" id="exitModal">
    <div class="exit-content">
        <h3>Finish Workout?</h3>
        <p>You have not completed all exercises.</p>
        <div class="exit-btns">
            <button id="saveExitBtn" class="btn-save" onclick="saveAndExit()">Save &amp; Exit</button>
            <button onclick="exitWithoutSaving()">Exit without Saving</button>
            <button onclick="returnToWorkout()">Return to Workout</button>
        </div>
    </div>
</div>

<script>
window.ACTIVE_WORKOUT_CONFIG = {
    workoutPk:            "{{ workout.pk }}",
    totalExercises:       {{ total_exercises|default:0 }},
    csrfToken:            "{{ csrf_token }}",
    exercises:            {{ exercises_json|safe }},
    initialExerciseIndex: {{ initial_exercise_index|default:0 }},
    initialCompleted:     {{ initial_completed|default:0 }},
    defaultExerciseImage: "{% static 'images/default_exercise.svg' %}",
    completeUrl:          "{{ workout_complete_url|default:'' }}",
    exitRedirectUrl:      "",
};
const WORKOUT_URLS = {
    complete: "{{ workout_complete_url|default:'' }}",
    start:    "{{ workout_start_url|default:'' }}"
};
</script>
<script src="{% static 'js/active_workout.js' %}"></script>
</body>
</html>
