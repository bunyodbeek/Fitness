{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Workout - {{ workout.title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/active_workout.css' %}">
    <!-- Eski stillar ham saqlanadi (override qilinadi lekin xavfsiz) -->
    <link rel="stylesheet" href="{% static 'apps/css/active_workout_style.css' %}">
    
    <!-- Home Mode Styles Override -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;900&display=swap');

        :root {
            --gold: #ffd700;
            --gold2: #ffb300;
            --red: #ff4757;
            --green: #2ed573;
            --bg: #080c1a;
            --bg2: #111629;
            --bg3: #1a2038;
            --border: rgba(255,215,0,0.15);
            --text: #ffffff;
            --muted: rgba(255,255,255,0.45);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,215,0,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 90%, rgba(255,71,87,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        .session-header {
            background: rgba(8,12,26,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .exit-btn {
            background: rgba(255,71,87,0.12);
            border: 1px solid rgba(255,71,87,0.3);
            color: var(--red);
            font-family: 'DM Sans', sans-serif;
        }

        .progress-counter {
            color: var(--gold);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
        }
        
        #floatingTimer {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .exercise-name {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            color: var(--text);
            font-size: clamp(28px, 8vw, 38px);
        }

        .strength-chip {
            background: rgba(255,215,0,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            color: var(--gold);
            font-family: 'DM Sans', sans-serif;
            border-radius: 999px;
        }
        
        .strength-chip input[type="number"] {
            background: transparent;
            border: none;
            color: var(--gold);
            width: 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.5);
            outline: none;
        }
        
        .strength-chip input[type="number"]::-webkit-inner-spin-button, 
        .strength-chip input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .did-it-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--bg);
            border: none;
            box-shadow: 0 6px 24px rgba(255,215,0,0.35);
            font-family: 'DM Sans', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        .did-it-btn.completed {
            background: linear-gradient(135deg, var(--green), #1db954);
            box-shadow: 0 6px 24px rgba(46,213,115,0.3);
            color: #fff;
        }
        
        .pause-btn {
            background: var(--bg3);
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        
        .rest-overlay-panel, .exit-modal-content {
            background: var(--bg2);
            border: 1px solid var(--border);
        }
        
        .rest-title {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--gold);
            letter-spacing: 2px;
        }
        
        .rest-timer {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--gold);
        }
        
        .btn-save-exit {
            background: linear-gradient(135deg, var(--gold), var(--gold2)) !important;
            color: var(--bg) !important;
        }

    </style>
</head>

<body>
    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

    <!-- ============================================================
     HEADER
     ============================================================ -->
    <div class="session-header">
        <button class="exit-btn" onclick="showExitModal()">EXIT</button>

        <div class="progress-counter">
            <span id="current">1</span>&nbsp;/&nbsp;<span id="total">{{ total_exercises }}</span>
        </div>

        <!-- Timer header ichida, menu-btn dan chap tomonda -->
        <div class="floating-timer" id="floatingTimer">00:00</div>

        <button class="menu-btn">
            <i class="fas fa-ellipsis-v"></i>
        </button>
    </div>

    <!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
    <div class="exercise-content">

        <!-- Media card -->
        <div class="exercise-media-container" onclick="toggleExerciseMedia()">
            <video class="exercise-video" id="exerciseVideo" playsinline controls></video>
            <img src="{% static 'images/default_exercise.svg' %}" alt="Exercise" class="exercise-image"
                id="exerciseImage">
            <div class="play-video-hint" id="playVideoHint" style="display:none;">
                Tap image to play video
            </div>
            <div class="exercise-description-overlay" id="exerciseDescriptionCard"
                onclick="toggleExerciseDescription(event)" style="display:none;">
                <div class="exercise-description-text" id="exerciseDescription"></div>
                <div class="exercise-description-hint" id="exerciseDescriptionHint">Tap to expand</div>
            </div>
        </div>

        <!-- Exercise name -->
        <h2 class="exercise-name" id="exerciseName"></h2>

        <!-- Set / Reps chips -->
        <div id="strengthDetails">
            <div class="strength-chip">
                Set <span id="currentSet">1</span> / <span id="totalSets"></span>
            </div>
            <div class="strength-chip">
                <span id="repsCount"></span> Reps
            </div>
            <div class="strength-chip" style="display:flex; align-items:center; gap:5px;">
                <input type="number" id="weightInput" value="" step="0.5" min="0" placeholder="0"> kg
            </div>
        </div>

        <!-- Up next -->
        <div class="up-next-section" id="upNext" style="display:none;">
            <div class="up-next-label">UP NEXT</div>
            <div class="up-next-content">
                <img src="{% static 'images/default_exercise.svg' %}" alt="Next" class="up-next-image" id="upNextImage">
                <div class="up-next-info">
                    <div class="up-next-name" id="upNextName"></div>
                    <div class="up-next-details" id="upNextDetails"></div>
                </div>
            </div>
        </div>

    </div><!-- /exercise-content -->

    <!-- ============================================================
     BOTTOM ACTION BAR
     ============================================================ -->
    <div class="action-buttons">
        <button class="pause-btn" id="pauseBtn" onclick="togglePause()">
            <span id="pauseIcon"><i class="fas fa-pause"></i></span>
        </button>
        <button class="did-it-btn" id="didItBtn" onclick="completeExercise()">
            Set Done
        </button>
    </div>

    <!-- ============================================================
     REST OVERLAY
     ============================================================ -->
    <div class="rest-overlay" id="restOverlay">
        <div class="rest-overlay-panel">
            <div class="rest-title">Rest</div>
            <div class="set-complete-badge" id="setCompleteBadge">Set 1 Complete ✅</div>

            <div class="rest-timer-circle">
                <div class="rest-timer" id="restTimer">00:00</div>
                <div class="rest-skip-text">Recover &amp; breathe</div>
            </div>

            <button class="rest-skip-btn" onclick="skipRest()">Skip Rest</button>

            <div class="rest-up-next">
                <div class="rest-up-next-label">Next Up</div>
                <div class="rest-up-next-name" id="restUpNextName">Set 2</div>
            </div>
        </div>
    </div>

    <!-- ============================================================
     EXIT MODAL
     ============================================================ -->
    <div class="exit-modal" id="exitModal">
        <div class="exit-modal-content">
            <h3>Finish Workout?</h3>
            <p>You have not completed all exercises.</p>
            <div class="exit-modal-buttons">
                <button id="saveExitBtn" class="btn-save-exit" onclick="saveAndExit()">
                    Save &amp; Exit
                </button>
                <button onclick="exitWithoutSaving()">Exit without Saving</button>
                <button onclick="returnToWorkout()">Return to Workout</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
     CONFIG & SCRIPTS
     ============================================================ -->
    <script>
        window.ACTIVE_WORKOUT_CONFIG = {
            workoutPk: "{{ workout.pk }}",
            totalExercises: {{ total_exercises|default:0 }},
            csrfToken: "{{ csrf_token }}",
            exercises: {{ exercises_json|safe }},
            initialExerciseIndex: {{ initial_exercise_index|default:0 }},
            initialSet: {{ initial_set|default:1 }},
            initialCompleted: {{ initial_completed|default:0 }},
        defaultExerciseImage: "{% static 'images/default_exercise.svg' %}",
            completeUrl: "{{ workout_complete_url|default:'' }}",
                restartUrl: "{{ workout_start_url|default:'' }}",
    };
        const WORKOUT_URLS = {
            complete: "{{ workout_complete_url|default:'' }}",
            start: "{{ workout_start_url|default:'' }}"
        };
    </script>
    <script src="{% static 'js/active_workout.js' %}"></script>
</body>

</html>
