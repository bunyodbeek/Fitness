{% extends 'base.html' %}{% load i18n %}
{% block content %}<div style="max-width:480px;margin:0 auto;padding:16px;background:#0d0f18;min-height:100vh;">{% for program in programs %}<div style="backdrop-filter:blur(10px);background:rgba(255,255,255,.08);border:1px solid #ffd700;border-radius:14px;padding:14px;margin-bottom:12px;"><h3 style="color:#fff;">{{ program.name }}</h3><p style="color:#ffd700;">{{ program.description }}</p><span style="color:#ffd700;">{% if program.plans.first.is_4_week %}4{% else %}6{% endif %} {% trans 'WEEKS' %}</span></div>{% endfor %}</div>{% endblock %}
