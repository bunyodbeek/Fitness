<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Upgrade</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #111;
            height: 200vh;
        }

        /* ===== OVERLAY ===== */
        .premium-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            animation: fadeIn 0.4s ease forwards;
            z-index: 999999;
            padding: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== MODAL CARD ===== */
        .premium-card {
            width: 100%;
            max-width: 430px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            margin-top: 40px;
            border-radius: 22px;
            padding-bottom: 22px;
            overflow: hidden;
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
            animation: slideDown 0.5s cubic-bezier(.18,.89,.32,1.28);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-40px) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* ===== TOP BANNER ===== */
        .premium-top {
            height: 240px;
            position: relative;
        }

        .premium-top img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .premium-title-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: white;
        }

        .premium-title-box h1 {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .premium-title-box h2 {
            font-size: 23px;
            color: #ffd700;
            font-weight: 800;
        }

        /* ===== CLOSE BUTTON ===== */
        .close-premium {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.25s;
        }

        .close-premium:hover {
            background: rgba(255,215,0,0.35);
            transform: rotate(90deg);
        }

        /* ===== CONTENT ===== */
        .premium-content {
            padding: 22px;
            color: white;
            text-align: center;
        }

        .features {
            text-align: left;
            margin-top: 12px;
            margin-bottom: 26px;
        }

        .features div {
            margin-bottom: 12px;
            font-size: 15px;
            display: flex;
            gap: 10px;
        }

        .features div span {
            color: #ffd700;
            font-weight: bold;
        }

        /* ===== PRICING CARD ===== */
        .pricing-card {
            background: linear-gradient(135deg, rgba(30,30,30,0.95) 0%, rgba(20,20,20,0.95) 100%);
            border-radius: 18px;
            padding: 24px;
            border: 1px solid rgba(255,215,0,0.2);
            margin-bottom: 20px;
        }

        .plan-label {
            display: inline-block;
            background: rgba(255,215,0,0.15);
            color: #ffd700;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .plan-price {
            font-size: 42px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .plan-description {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        /* ===== SINGLE PLAN BUTTON ===== */
        .plan-btn {
            padding: 16px 28px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: none;
            color: #121212;
            cursor: pointer;
            transition: 0.28s;
            box-shadow: 0 6px 18px rgba(255, 215, 0, 0.25);
        }

        .plan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
        }

        .plan-btn:active {
            transform: translateY(0px);
        }

        /* ===== FOOTER ===== */
        .premium-footer {
            margin-top: 22px;
            font-size: 12px;
            color: #aaa;
        }

        .premium-footer a {
            color: #ffd700;
            text-decoration: underline;
        }

        @media (max-width: 430px) {
            .premium-title-box h1 {
                font-size: 26px;
            }
            .premium-title-box h2 {
                font-size: 20px;
            }
        }

    </style>
</head>

<body>

<!-- PREMIUM MODAL -->
<div class="premium-overlay" id="premiumModal">

    <div class="premium-card">

        <div class="premium-top">
            <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&w=900&q=60">
            <div class="close-premium" onclick="closePremium()">×</div>

            <div class="premium-title-box">
                <h1>Train Smarter.</h1>
                <h2>Reach your goals</h2>
            </div>
        </div>

        <div class="premium-content">

            <div class="features">
                <div><span>✓</span> Personalized workout guidance</div>
                <div><span>✓</span> Weight suggestions for every exercise</div>
                <div><span>✓</span> 500+ HD videos unlocked</div>
                <div><span>✓</span> Full analytics & progress</div>
            </div>

            <div class="pricing-card">
                <div class="plan-label">⚡ Lifetime Deal</div>
                <div class="plan-price">$102.18</div>
                <div class="plan-description">One-time payment • Forever yours</div>
                <button class="plan-btn" onclick="purchasePremium()">
                    Get Lifetime Access
                </button>
            </div>

            <div class="premium-footer">
                No subscription. Pay once, own forever.<br>
                <a href="#">Terms & Conditions</a>
            </div>

        </div>

    </div>

</div>

<script>
    function purchasePremium() {
        window.location.href = '/payment?plan=lifetime';
    }

    function closePremium() {
        const modal = document.getElementById("premiumModal");
        modal.style.opacity = "0";
        modal.style.pointerEvents = "none";

        setTimeout(() => {
            modal.remove();
            window.history.back();
        }, 300);
    }

    // close if click outside
    document.getElementById("premiumModal").addEventListener("click", function(e){
        if (e.target === this) closePremium();
    });

    // close on ESC
    document.addEventListener("keydown", e => {
        if (e.key === "Escape") closePremium();
    });
</script>

</body>
</html>
