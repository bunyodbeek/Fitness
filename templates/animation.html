{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shredzville</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; overflow: hidden; }
    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<video autoplay muted playsinline id="introVideo">
  <source src="{% static 'apps/videos/INTRO.mp4' %}" type="video/mp4">
</video>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  var _defaultUrl = "{% url 'program_list' %}";

  var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  if (tg) { try { tg.expand(); } catch (e) {} }

  (function() {
    try {
      var startParam = tg ? (tg.initDataUnsafe || {}).start_param || '' : '';
      if (startParam.indexOf('import_') === 0) {
        var token = startParam.slice(7).toUpperCase();
        var lang = window.location.pathname.match(/^\/(en|ru|uz)\//)?.[1] || 'uz';
        _defaultUrl = '/' + lang + '/programs/import/' + token + '/';
      }
    } catch(e) {}
  })();

  function getCookie(name) {
    var value = '; ' + document.cookie;
    var parts = value.split('; ' + name + '=');
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
  }

  // Kirish nuqtasida foydalanuvchini login qilamiz, shunda sessiya o'rnatiladi va
  // himoyalangan sahifalar (profil, premium, favorites) birinchi bosishdayoq ochiladi.
  // Anonim POST'da DRF CSRF talab qilmaydi, lekin token bo'lsa ham yuboramiz.
  var authPromise = (function() {
    var telegramId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user
      ? tg.initDataUnsafe.user.id : null;
    if (!telegramId) return Promise.resolve();
    var csrf = getCookie('csrftoken');
    return fetch("{% url 'telegram_auth' %}", {
      method: 'POST',
      headers: Object.assign({'Content-Type': 'application/json'},
        csrf ? {'X-CSRFToken': csrf} : {}),
      credentials: 'include',
      body: JSON.stringify({ telegram_id: telegramId })
    }).catch(function(e) { console.error('Auth error:', e); });
  })();

  // Sessiya o'rnatilmaguncha redirect qilmaymiz (video tugashi bilan auth tugashini
  // ikkalasini ham kutamiz). Video umuman o'ynamasa, 6s dan keyin baribir o'tamiz.
  var redirected = false;
  function go() {
    if (redirected) return;
    redirected = true;
    authPromise.then(function() { window.location.href = _defaultUrl; });
  }

  document.getElementById('introVideo').addEventListener('ended', go);
  setTimeout(go, 6000);
</script>

</body>
</html>
