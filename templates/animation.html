{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shredzville</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; overflow: hidden; }
    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<video autoplay muted playsinline id="introVideo">
  <source src="{% static 'apps/videos/INTRO.mp4' %}" type="video/mp4">
</video>

<script>
  document.getElementById('introVideo').addEventListener('ended', function() {
    window.location.href = "{% url 'program_list' %}";
  });
</script>

</body>
</html>
